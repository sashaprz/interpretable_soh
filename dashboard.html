<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/javascript">
/* soh-data.js — deterministic mock dataset for the Interpretable SOH batch flow.
 * Models the Oxford Battery Degradation Dataset (graphite/NMC pouch cells) and
 * the sashaprz/interpretable_soh pipeline contract:
 *   dQ/dV ICA → ΔQ(V) features → ElasticNet SOH (LOCO CV) → physics interpretation.
 *
 * Mechanisms are LIFE-STAGED so each emerges at a different point in cycle life:
 *   LLI  (lithium inventory loss)  — saturating, strongest EARLY  (SEI growth)
 *   LAM  (loss of active material) — sigmoid, emerges MID-life
 *   R↑   (resistance growth)       — accelerating, dominates LATE  (knee)
 * This makes "where each mechanism occurs" a real, segmentable story.
 * Exposes window.SOHData. Seeded → stable across reloads.
 */
(function () {
  'use strict';

  function rng(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const gauss = (x, mu, s, amp) => amp * Math.exp(-0.5 * ((x - mu) / s) ** 2);

  // life-fraction mechanism kernels — tuned so dominance HANDS OFF over life:
  //   LLI saturates early to a plateau < 1 (peak shift happens then stabilises),
  //   LAM emerges mid-life (sigmoid), R↑ accelerates late and can overtake both.
  const kLLI = (f) => 0.58 * (1 - Math.exp(-f / 0.09));
  const kLAM = (f) => 0.92 / (1 + Math.exp(-(f - 0.46) / 0.085));
  const kRES = (f) => Math.pow(f, 1.9);

  const V_MIN = 3.0, V_MAX = 4.2, N_V = 220;
  const VOLT = Array.from({ length: N_V }, (_, i) => V_MIN + (V_MAX - V_MIN) * i / (N_V - 1));
  const GRID_MV = (VOLT[1] - VOLT[0]) * 1000;

  const BASE_PEAKS = [
    { mu: 3.49, sigma: 0.045, amp: 4.2 },
    { mu: 3.63, sigma: 0.038, amp: 6.1 },
    { mu: 3.91, sigma: 0.055, amp: 3.4 },
  ];

  // per-cell mechanism personality weights — chosen to give a varied population
  // (some progress through all three pathways, others are LAM- or R↑-led).
  const CELLS_SPEC = [
    { id: 'Cell_01', maxCycle: 8000, eol: 0.802, lli: 1.00, lam: 1.00, res: 1.08, temp: 40, seed: 11 }, // showcase: LLI→LAM→R↑
    { id: 'Cell_02', maxCycle: 7600, eol: 0.812, lli: 1.00, lam: 1.18, res: 0.70, temp: 40, seed: 23 }, // LAM-led
    { id: 'Cell_03', maxCycle: 5400, eol: 0.806, lli: 0.90, lam: 0.85, res: 1.35, temp: 50, seed: 37 }, // early R↑ knee
    { id: 'Cell_04', maxCycle: 6800, eol: 0.809, lli: 1.00, lam: 1.00, res: 1.00, temp: 45, seed: 41 }, // balanced
    { id: 'Cell_05', maxCycle: 7200, eol: 0.815, lli: 1.15, lam: 0.78, res: 0.60, temp: 40, seed: 53 }, // LLI-led
    { id: 'Cell_06', maxCycle: 5800, eol: 0.804, lli: 0.85, lam: 1.00, res: 1.22, temp: 50, seed: 67 }, // LLI→LAM→R↑
  ];

  function moments(arr) {
    const n = arr.length;
    let mean = 0; for (const v of arr) mean += v; mean /= n;
    let m2 = 0, m3 = 0, m4 = 0, sumabs = 0, ss = 0, mn = Infinity, mx = -Infinity, maxdev = 0;
    for (const v of arr) {
      const d = v - mean; m2 += d * d; m3 += d ** 3; m4 += d ** 4;
      sumabs += Math.abs(v); ss += v * v;
      if (v < mn) mn = v; if (v > mx) mx = v;
      if (Math.abs(v) > maxdev) maxdev = Math.abs(v);
    }
    const variance = m2 / n, sd = Math.sqrt(variance) || 1e-9;
    return {
      dqv_variance: variance, dqv_log_variance: Math.log(variance + 1e-12),
      dqv_skewness: (m3 / n) / sd ** 3, dqv_kurtosis: (m4 / n) / variance ** 2 - 3,
      dqv_integral_abs: sumabs * (VOLT[1] - VOLT[0]), dqv_max_deviation: maxdev,
      dqv_min: mn, dqv_max: mx, dqv_mean: mean, dqv_rms: Math.sqrt(ss / n),
    };
  }
  function simpson(y) {
    const h = VOLT[1] - VOLT[0];
    let s = y[0] + y[y.length - 1];
    for (let i = 1; i < y.length - 1; i++) s += (i % 2 ? 4 : 2) * y[i];
    return s * h / 3;
  }

  const MECH_ORDER = ['LLI', 'LAM', 'RES'];
  const MECH = {
    LLI: { key: 'LLI', name: 'Lithium inventory loss', short: 'LLI', cssVar: '--mech-lli', stage: 'early' },
    LAM: { key: 'LAM', name: 'Loss of active material', short: 'LAM', cssVar: '--mech-lam', stage: 'mid' },
    RES: { key: 'RES', name: 'Resistance growth', short: 'R↑', cssVar: '--mech-res', stage: 'late' },
  };

  function buildCell(spec) {
    const r = rng(spec.seed);
    const step = 100;
    const cycles = [];
    for (let c = 0; c <= spec.maxCycle; c += step) cycles.push(c);
    const N = cycles.length;

    const refPeaks = BASE_PEAKS.map((p) => ({
      mu: p.mu + (r() - 0.5) * 0.006, sigma: p.sigma * (1 + (r() - 0.5) * 0.08), amp: p.amp * (1 + (r() - 0.5) * 0.06),
    }));
    const icaRef = VOLT.map((v) => refPeaks.reduce((s, p) => s + gauss(v, p.mu, p.sigma, p.amp), 0));
    const refArea = simpson(icaRef);

    const rows = [], rawFade = [];
    for (let i = 0; i < N; i++) {
      const f = cycles[i] / spec.maxCycle;
      const wl = spec.lli * kLLI(f), wm = spec.lam * kLAM(f), wr = spec.res * kRES(f);

      // ICA peak evolution driven by the three signals
      const peaks = refPeaks.map((p, k) => {
        const shift = -wl * 0.10 * (1 + 0.12 * k);
        const ampScale = 1 - Math.min(0.9, wm) * (0.8 + (k === 1 ? 0.2 : 0));
        const widen = 1 + Math.min(1.3, wr) * 1.2;
        return { mu: p.mu + shift, sigma: p.sigma * widen, amp: Math.max(0.05, p.amp * ampScale), shiftMv: shift * 1000 };
      });
      const ica = VOLT.map((v) => peaks.reduce((s, p) => s + gauss(v, p.mu, p.sigma, p.amp), 0));
      const dq = ica.map((y, j) => y - icaRef[j]);
      const feats = moments(dq);

      // physics scalars (derived from the actual ICA where possible)
      const meanShiftV = wl * 0.10;
      const lamLoss = Math.max(0, 1 - simpson(ica) / (refArea + 1e-9));
      const resGrowth = Math.min(1.3, wr) * 1.2;

      const tot = wl + wm + wr;
      const probs = { LLI: wl / (tot + 1e-9), LAM: wm / (tot + 1e-9), RES: wr / (tot + 1e-9) };
      const dominant = tot < 0.10 ? 'EARLY' : (wl >= wm && wl >= wr ? 'LLI' : wm >= wr ? 'LAM' : 'RES');
      const conf = Math.min(0.97, 0.55 + (Math.max(wl, wm, wr) / (tot + 1e-9)) * 0.5 - (r() - 0.5) * 0.03);

      const diag = peaks.map((p, k) => ({
        label: ['Graphite stage I', 'Graphite stage II', 'NMC H1→H2'][k],
        voltage: p.mu, shiftMv: p.shiftMv, widthMv: p.sigma * 2.355 * 1000,
        areaLossPct: (1 - p.amp / refPeaks[k].amp) * 100,
      }));

      rawFade.push(0.11 * wl + 0.17 * wm + 0.05 * wr);
      rows.push({ cycle: cycles[i], lifeFrac: f, ica, dq, feats,
        signals: { LLI: wl, LAM: wm, RES: wr },
        phys: { meanShiftV, lamLoss, resGrowth, probs, dominant, conf, tot }, diag });
    }

    // SOH from fade, normalized so final ≈ declared EOL; add small noise; predict
    const fadeEnd = rawFade[N - 1] || 1;
    const targetFade = 1 - spec.eol;
    const sohTrue = [], sohPred = [];
    for (let i = 0; i < N; i++) {
      let soh = 1 - rawFade[i] / fadeEnd * targetFade + (r() - 0.5) * 0.003;
      sohTrue.push(soh);
    }
    for (let i = 0; i < N; i++) {
      const res = (rng(spec.seed + i * 7)() - 0.5) * 0.016 + Math.sin(i * 0.7) * 0.004;
      sohPred.push(sohTrue[i] + res);
    }
    const errs = sohTrue.map((t, i) => sohPred[i] - t);
    const rmse = Math.sqrt(errs.reduce((s, e) => s + e * e, 0) / N);
    const mae = errs.reduce((s, e) => s + Math.abs(e), 0) / N;
    const ybar = sohTrue.reduce((s, v) => s + v, 0) / N;
    const ssTot = sohTrue.reduce((s, v) => s + (v - ybar) ** 2, 0);
    const r2 = 1 - errs.reduce((s, e) => s + e * e, 0) / ssTot;

    let rul = null;
    for (let i = 1; i < N; i++) {
      if (sohPred[i] <= 0.80) {
        const t = (0.80 - sohPred[i - 1]) / (sohPred[i] - sohPred[i - 1]);
        rul = Math.round(cycles[i - 1] + t * step); break;
      }
    }

    // ── phases: collapse the per-cycle dominant sequence into contiguous segments
    const domSeq = rows.map((r2) => r2.phys.dominant);
    let phases = [];
    for (let i = 0; i < N; i++) {
      const d = domSeq[i];
      if (!phases.length || phases[phases.length - 1].mech !== d) {
        phases.push({ mech: d, i0: i, i1: i });
      } else phases[phases.length - 1].i1 = i;
    }
    // merge runs shorter than 3 samples into the previous phase
    phases = phases.reduce((acc, p) => {
      const len = p.i1 - p.i0 + 1;
      if (acc.length && len < 3 && p.mech !== 'EARLY') { acc[acc.length - 1].i1 = p.i1; }
      else acc.push(p);
      return acc;
    }, []);
    phases = phases.map((p) => {
      // peak share for this mechanism within the phase
      let share = 0;
      for (let i = p.i0; i <= p.i1; i++) {
        const pr = rows[i].phys.probs[p.mech]; if (pr > share) share = pr;
      }
      return {
        mech: p.mech,
        startCycle: cycles[p.i0], endCycle: cycles[p.i1],
        startFrac: p.i0 / (N - 1), endFrac: p.i1 / (N - 1),
        sohStart: sohTrue[p.i0], sohEnd: sohTrue[p.i1],
        peakShare: share, i0: p.i0, i1: p.i1,
      };
    });

    // onset cycle per mechanism = first cycle its weighted signal crosses 0.12
    const onsets = {};
    for (const m of MECH_ORDER) {
      onsets[m] = null;
      for (let i = 0; i < N; i++) {
        if (rows[i].signals[m] > 0.16) { onsets[m] = cycles[i]; break; }
      }
    }

    return {
      id: spec.id, chemistry: 'Graphite / NMC', form: 'Pouch', capacityMah: 740,
      tempC: spec.temp, maxCycle: spec.maxCycle, nCycles: N, cycles, step,
      sohTrue, sohPred, icaRef, rows,
      metrics: { rmse, mae, r2 }, rul, eol: spec.eol,
      sohLast: sohTrue[N - 1], cellDominant: phases.filter((p) => p.mech !== 'EARLY').slice(-1)[0]?.mech || 'LLI',
      phases, onsets,
    };
  }

  const cells = CELLS_SPEC.map(buildCell);
  const byId = Object.fromEntries(cells.map((c) => [c.id, c]));

  function overall() {
    let n = 0, se = 0, ae = 0, all = [], allErr = [];
    for (const c of cells) for (let i = 0; i < c.nCycles; i++) {
      const e = c.sohPred[i] - c.sohTrue[i];
      se += e * e; ae += Math.abs(e); n++; all.push(c.sohTrue[i]); allErr.push(e);
    }
    const ybar = all.reduce((s, v) => s + v, 0) / n;
    const ssTot = all.reduce((s, v) => s + (v - ybar) ** 2, 0);
    return { rmse: Math.sqrt(se / n), mae: ae / n, r2: 1 - allErr.reduce((s, e) => s + e * e, 0) / ssTot, n };
  }

  // ── batch-average pseudo-cell: aggregate the batch over normalized life ──
  const mean = (a) => a.reduce((s, v) => s + v, 0) / a.length;
  const avgArrays = (arrs) => { const n = arrs[0].length, o = new Array(n).fill(0); for (const a of arrs) for (let i = 0; i < n; i++) o[i] += a[i]; for (let i = 0; i < n; i++) o[i] /= arrs.length; return o; };

  function buildBatch(ids) {
    const cs = (ids && ids.length ? ids : cells.map((c) => c.id)).map((id) => byId[id]).filter(Boolean);
    const M = 81, maxCycle = Math.round(mean(cs.map((c) => c.maxCycle)));
    const cycles = [], sohTrue = [], sohPred = [], rows = [];
    const icaRef = avgArrays(cs.map((c) => c.icaRef));
    for (let k = 0; k < M; k++) {
      const f = k / (M - 1); cycles.push(Math.round(f * maxCycle));
      const pk = cs.map((c) => { const idx = Math.round(f * (c.nCycles - 1)); return { r: c.rows[idx], st: c.sohTrue[idx], sp: c.sohPred[idx] }; });
      sohTrue.push(mean(pk.map((p) => p.st))); sohPred.push(mean(pk.map((p) => p.sp)));
      const ica = avgArrays(pk.map((p) => p.r.ica)), dq = avgArrays(pk.map((p) => p.r.dq)), feats = moments(dq);
      const signals = { LLI: mean(pk.map((p) => p.r.signals.LLI)), LAM: mean(pk.map((p) => p.r.signals.LAM)), RES: mean(pk.map((p) => p.r.signals.RES)) };
      const tot = signals.LLI + signals.LAM + signals.RES;
      const probs = { LLI: signals.LLI / (tot + 1e-9), LAM: signals.LAM / (tot + 1e-9), RES: signals.RES / (tot + 1e-9) };
      const dominant = tot < 0.10 ? 'EARLY' : (signals.LLI >= signals.LAM && signals.LLI >= signals.RES ? 'LLI' : signals.LAM >= signals.RES ? 'LAM' : 'RES');
      const phys = { meanShiftV: mean(pk.map((p) => p.r.phys.meanShiftV)), lamLoss: mean(pk.map((p) => p.r.phys.lamLoss)), resGrowth: mean(pk.map((p) => p.r.phys.resGrowth)), probs, dominant, conf: mean(pk.map((p) => p.r.phys.conf)), tot };
      const diag = [0, 1, 2].map((j) => ({ label: cs[0].rows[0].diag[j].label, voltage: mean(pk.map((p) => p.r.diag[j].voltage)), shiftMv: mean(pk.map((p) => p.r.diag[j].shiftMv)), widthMv: mean(pk.map((p) => p.r.diag[j].widthMv)), areaLossPct: mean(pk.map((p) => p.r.diag[j].areaLossPct)) }));
      rows.push({ cycle: cycles[k], lifeFrac: f, ica, dq, feats, signals, phys, diag });
    }
    let phases = [];
    const domSeq = rows.map((r) => r.phys.dominant);
    for (let i = 0; i < M; i++) { const d = domSeq[i]; if (!phases.length || phases[phases.length - 1].mech !== d) phases.push({ mech: d, i0: i, i1: i }); else phases[phases.length - 1].i1 = i; }
    phases = phases.reduce((acc, p) => { const len = p.i1 - p.i0 + 1; if (acc.length && len < 3 && p.mech !== 'EARLY') acc[acc.length - 1].i1 = p.i1; else acc.push(p); return acc; }, []);
    phases = phases.map((p) => { let share = 0; for (let i = p.i0; i <= p.i1; i++) { const pr = rows[i].phys.probs[p.mech]; if (pr > share) share = pr; } return { mech: p.mech, startCycle: cycles[p.i0], endCycle: cycles[p.i1], startFrac: p.i0 / (M - 1), endFrac: p.i1 / (M - 1), sohStart: sohTrue[p.i0], sohEnd: sohTrue[p.i1], peakShare: share, i0: p.i0, i1: p.i1 }; });
    const onsets = {};
    for (const m of MECH_ORDER) { onsets[m] = null; for (let i = 0; i < M; i++) { if (rows[i].signals[m] > 0.16) { onsets[m] = cycles[i]; break; } } }
    let rul = null;
    for (let i = 1; i < M; i++) { if (sohPred[i] <= 0.80) { const t = (0.80 - sohPred[i - 1]) / (sohPred[i] - sohPred[i - 1]); rul = Math.round(cycles[i - 1] + t * (cycles[i] - cycles[i - 1])); break; } }
    const ov = overall();
    return { id: 'Batch average', chemistry: 'Graphite / NMC', form: 'Pouch', capacityMah: 740, tempC: Math.round(mean(cs.map((c) => c.tempC))), maxCycle, nCycles: M, cycles, step: Math.round(maxCycle / (M - 1)), sohTrue, sohPred, icaRef, rows, metrics: { r2: ov.r2, rmse: ov.rmse, mae: ov.mae }, rul, eol: mean(cs.map((c) => c.eol)), sohLast: sohTrue[M - 1], cellDominant: phases.filter((p) => p.mech !== 'EARLY').slice(-1)[0]?.mech || 'LLI', phases, onsets, isBatch: true, nCells: cs.length };
  }

  const featureImportance = [
    { feature: 'dqv_log_variance', coefficient: -0.142 },
    { feature: 'dqv_variance', coefficient: -0.087 },
    { feature: 'dqv_max_deviation', coefficient: -0.061 },
    { feature: 'dqv_integral_abs', coefficient: -0.054 },
    { feature: 'dqv_rms', coefficient: -0.041 },
    { feature: 'dqv_kurtosis', coefficient: 0.033 },
    { feature: 'dqv_skewness', coefficient: 0.022 },
  ].map((f) => ({ ...f, abs: Math.abs(f.coefficient) }));

  const FEATURE_META = {
    dqv_log_variance: { name: 'Log variance', desc: 'log of ΔQ(V) spread — primary degradation signal' },
    dqv_variance: { name: 'Variance', desc: 'spread of ΔQ(V)' },
    dqv_skewness: { name: 'Skewness', desc: 'asymmetry of ΔQ(V)' },
    dqv_kurtosis: { name: 'Kurtosis', desc: 'tailedness' },
    dqv_integral_abs: { name: 'Abs integral', desc: 'total |ΔQ| area' },
    dqv_max_deviation: { name: 'Max deviation', desc: 'largest |ΔQ|' },
    dqv_rms: { name: 'RMS', desc: 'root-mean-square of ΔQ(V)' },
  };

  // how each mechanism reads in dQ/dV space + how it is inferred
  const MECH_INFO = {
    LLI: { signature: 'Peaks shift to lower voltage', infer: 'Tracks peak-voltage displacement vs. the fresh-cell baseline (Hungarian peak matching).', when: 'Early life' },
    LAM: { signature: 'Peak heights & total area shrink', infer: 'Integrates ICA area loss — fewer host sites means less charge per peak.', when: 'Mid life' },
    RES: { signature: 'Peaks broaden & flatten', infer: 'Measures peak FWHM growth — polarisation smears the phase transitions.', when: 'Late life' },
  };

  window.SOHData = {
    VOLT, V_MIN, V_MAX, GRID_MV, cells, byId, cellIds: cells.map((c) => c.id),
    overall: overall(), buildBatch, featureImportance, FEATURE_META, MECH, MECH_ORDER, MECH_INFO,
    EOL_THRESHOLD: 0.80,
  };
})();

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

<script type="text/babel">
/* soh-charts.jsx — canvas charts for the SOH batch flow.
 * Exports: useCanvas, SOHLine, MechTimeline, ICASketch, Spark.
 * Synchronous draw (no rAF — throttled in embedded iframes) + resize/late-layout retries.
 */

function useCanvas(draw, deps) {
  const ref = React.useRef(null);
  const drawRef = React.useRef(draw);
  drawRef.current = draw;
  React.useEffect(() => {
    const cvs = ref.current;
    if (!cvs) return;
    let dead = false;
    const render = () => {
      if (dead) return;
      const parent = cvs.parentElement;
      if (!parent) return;
      const w = parent.clientWidth, h = parent.clientHeight;
      if (w === 0 || h === 0) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      cvs.width = w * dpr; cvs.height = h * dpr;
      cvs.style.width = w + 'px'; cvs.style.height = h + 'px';
      const ctx = cvs.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);
      drawRef.current(ctx, w, h);
    };
    render();
    const timers = [60, 220, 600].map((ms) => setTimeout(render, ms));
    const ro = new ResizeObserver(render);
    ro.observe(cvs.parentElement);
    return () => { dead = true; timers.forEach(clearTimeout); ro.disconnect(); };
  }, deps); // eslint-disable-line
  return ref;
}

const scale = (dmin, dmax, rmin, rmax) => { const s = (dmax - dmin) || 1; return (v) => rmin + (v - dmin) / s * (rmax - rmin); };
const fmtCyc = (n) => n >= 1000 ? (n / 1000).toFixed(n % 1000 ? 1 : 0) + 'k' : String(Math.round(n));
const MV = { LLI: '--mech-lli', LAM: '--mech-lam', RES: '--mech-res' };
function cssRGB(el, varName) {
  const v = getComputedStyle(el).getPropertyValue(varName).trim();
  return v || '#888';
}

// ───────────────────────── SOH trajectory ─────────────────────────
// predicted (glow) vs measured (dashed), uncertainty band, EOL line,
// faint mechanism-phase background shading, onset markers, selected cycle.
function SOHLine({ cell, selIdx, onSelect, pal, showBand, showPhases, height }) {
  const padL = 50, padR = 16, padT = 16, padB = 30;
  const geomRef = React.useRef(null);
  const hostRef = React.useRef(null);

  const ref = useCanvas((ctx, w, h) => {
    const host = hostRef.current;
    const cyc = cell.cycles, n = cyc.length;
    const x = scale(0, cell.maxCycle, padL, w - padR);
    const y = scale(0.78, 1.005, h - padB, padT);
    geomRef.current = { x, w };

    // mechanism phase shading
    if (showPhases) {
      for (const ph of cell.phases) {
        if (ph.mech === 'EARLY') continue;
        const x0 = x(ph.startCycle), x1 = x(ph.endCycle);
        const col = cssRGB(host, MV[ph.mech]);
        ctx.fillStyle = col; ctx.globalAlpha = 0.07;
        ctx.fillRect(x0, padT, x1 - x0, h - padB - padT);
        ctx.globalAlpha = 1;
      }
    }

    // grid + y labels
    ctx.font = '10px "IBM Plex Mono", monospace'; ctx.textBaseline = 'middle';
    for (let g = 0.80; g <= 1.0; g += 0.05) {
      const yy = y(g);
      ctx.strokeStyle = pal.grid; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(w - padR, yy); ctx.stroke();
      ctx.fillStyle = pal.faint; ctx.textAlign = 'right';
      ctx.fillText((g * 100).toFixed(0) + '%', padL - 7, yy);
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (let i = 0; i <= 5; i++) { const cv = cell.maxCycle * i / 5; ctx.fillStyle = pal.faint; ctx.fillText(fmtCyc(cv), x(cv), h - padB + 7); }

    // EOL threshold
    const yEol = y(0.80);
    ctx.strokeStyle = pal.danger; ctx.setLineDash([4, 4]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, yEol); ctx.lineTo(w - padR, yEol); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = pal.danger; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; ctx.font = '9px "IBM Plex Mono", monospace';
    ctx.fillText('EOL · 80%', padL + 4, yEol - 3);

    // onset markers
    ctx.textBaseline = 'top';
    let onsetRow = 0;
    for (const m of window.SOHData.MECH_ORDER) {
      const oc = cell.onsets[m]; if (oc == null || oc <= 0) continue;
      const px = x(oc), col = cssRGB(host, MV[m]);
      ctx.strokeStyle = col; ctx.globalAlpha = 0.5; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
      ctx.beginPath(); ctx.moveTo(px, padT); ctx.lineTo(px, h - padB); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
      ctx.fillStyle = col; ctx.font = '600 9px "IBM Plex Mono", monospace'; ctx.textAlign = 'left';
      ctx.fillText(window.SOHData.MECH[m].short + ' onset', px + 3, padT + 1 + (onsetRow % 2) * 12);
      onsetRow++;
    }

    // uncertainty band
    if (showBand) {
      ctx.beginPath();
      for (let i = 0; i < n; i++) { const rr = Math.abs(cell.sohPred[i] - cell.sohTrue[i]) + 0.006; const px = x(cyc[i]), py = y(cell.sohPred[i] + rr); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
      for (let i = n - 1; i >= 0; i--) { const rr = Math.abs(cell.sohPred[i] - cell.sohTrue[i]) + 0.006; ctx.lineTo(x(cyc[i]), y(cell.sohPred[i] - rr)); }
      ctx.closePath(); ctx.fillStyle = pal.accentFill; ctx.fill();
    }

    // measured (dashed)
    ctx.strokeStyle = pal.dim; ctx.lineWidth = 1.4; ctx.setLineDash([5, 4]);
    ctx.beginPath(); for (let i = 0; i < n; i++) { const px = x(cyc[i]), py = y(cell.sohTrue[i]); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); } ctx.stroke(); ctx.setLineDash([]);

    // predicted (glow accent)
    ctx.save(); ctx.shadowColor = pal.accent; ctx.shadowBlur = 10;
    ctx.strokeStyle = pal.accent; ctx.lineWidth = 2.4; ctx.lineJoin = 'round';
    ctx.beginPath(); for (let i = 0; i < n; i++) { const px = x(cyc[i]), py = y(cell.sohPred[i]); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); } ctx.stroke();
    ctx.restore();

    // selected cycle marker
    if (selIdx >= 0 && selIdx < n) {
      const px = x(cyc[selIdx]), py = y(cell.sohPred[selIdx]);
      ctx.strokeStyle = pal.text; ctx.globalAlpha = 0.45; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px, padT); ctx.lineTo(px, h - padB); ctx.stroke(); ctx.globalAlpha = 1;
      ctx.fillStyle = pal.accent; ctx.beginPath(); ctx.arc(px, py, 5, 0, 7); ctx.fill();
      ctx.strokeStyle = pal.panel; ctx.lineWidth = 2; ctx.stroke();
    }
  }, [cell, selIdx, pal, showBand, showPhases, height]);

  const pick = (e) => {
    const g = geomRef.current; if (!g) return -1;
    const rect = e.currentTarget.getBoundingClientRect(), mx = e.clientX - rect.left;
    let best = -1, bd = Infinity;
    for (let i = 0; i < cell.cycles.length; i++) { const d = Math.abs(g.x(cell.cycles[i]) - mx); if (d < bd) { bd = d; best = i; } }
    return best;
  };
  return (
    <div ref={hostRef} style={{ position: 'relative', width: '100%', height: height || '100%' }}>
      <canvas ref={ref} style={{ cursor: onSelect ? 'crosshair' : 'default', display: 'block' }}
        onPointerDown={(e) => onSelect && onSelect(pick(e))}
        onPointerMove={(e) => { if (e.buttons === 1 && onSelect) onSelect(pick(e)); }} />
    </div>
  );
}

// ───────────────────────── mechanism timeline ─────────────────────────
// horizontal band over the cycle axis, segmented by dominant mechanism.
function MechTimeline({ cell, selIdx, onSelect, pal }) {
  const padL = 50, padR = 16;
  const hostRef = React.useRef(null);
  const geomRef = React.useRef(null);
  const ref = useCanvas((ctx, w, h) => {
    const host = hostRef.current;
    const x = scale(0, cell.maxCycle, padL, w - padR);
    geomRef.current = { x };
    const top = 6, barH = h - 26;
    for (const ph of cell.phases) {
      const x0 = x(ph.startCycle), x1 = x(ph.endCycle);
      if (ph.mech === 'EARLY') {
        ctx.fillStyle = pal.track; ctx.fillRect(x0, top, x1 - x0, barH);
        ctx.fillStyle = pal.faint; ctx.font = '600 9px "IBM Plex Sans", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (x1 - x0 > 40) ctx.fillText('early', (x0 + x1) / 2, top + barH / 2);
        continue;
      }
      const col = cssRGB(host, MV[ph.mech]);
      ctx.fillStyle = col; ctx.globalAlpha = 0.85; ctx.fillRect(x0, top, x1 - x0, barH); ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff'; ctx.font = '600 10px "IBM Plex Sans", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (x1 - x0 > 46) ctx.fillText(window.SOHData.MECH[ph.mech].short, (x0 + x1) / 2, top + barH / 2);
    }
    // axis ticks
    ctx.fillStyle = pal.faint; ctx.font = '9px "IBM Plex Mono", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (let i = 0; i <= 5; i++) { const cv = cell.maxCycle * i / 5; ctx.fillText(fmtCyc(cv), x(cv), top + barH + 5); }
    // current cycle pin
    if (selIdx >= 0) {
      const px = x(cell.cycles[selIdx]);
      ctx.fillStyle = pal.text; ctx.beginPath(); ctx.moveTo(px, top - 5); ctx.lineTo(px - 4, top - 1); ctx.lineTo(px + 4, top - 1); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = pal.text; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(px, top); ctx.lineTo(px, top + barH); ctx.stroke();
    }
  }, [cell, selIdx, pal]);
  const pick = (e) => {
    const g = geomRef.current; if (!g) return -1;
    const rect = e.currentTarget.getBoundingClientRect(), mx = e.clientX - rect.left;
    let best = -1, bd = Infinity;
    for (let i = 0; i < cell.cycles.length; i++) { const d = Math.abs(g.x(cell.cycles[i]) - mx); if (d < bd) { bd = d; best = i; } }
    return best;
  };
  return (
    <div ref={hostRef} style={{ position: 'relative', width: '100%', height: '100%' }}>
      <canvas ref={ref} style={{ cursor: onSelect ? 'crosshair' : 'default', display: 'block' }}
        onPointerDown={(e) => onSelect && onSelect(pick(e))} />
    </div>
  );
}

// ───────────────────────── ICA sketch (explainer) ─────────────────────────
// small illustrative dQ/dV: fresh baseline + a distorted curve for `mode`.
function ICASketch({ mode, pal, accent }) {
  const ref = useCanvas((ctx, w, h) => {
    const padX = 8, padB = 4, padT = 6;
    const x = scale(3.3, 4.05, padX, w - padX);
    const peaks = [{ mu: 3.5, s: 0.05, a: 0.5 }, { mu: 3.66, s: 0.042, a: 0.85 }, { mu: 3.9, s: 0.06, a: 0.45 }];
    const y = scale(0, 1, h - padB, padT);
    const curve = (transform) => {
      ctx.beginPath();
      for (let i = 0; i <= 120; i++) {
        const v = 3.3 + (4.05 - 3.3) * i / 120;
        let val = 0;
        for (const p of peaks) { const t = transform(p); val += t.a * Math.exp(-0.5 * ((v - t.mu) / t.s) ** 2); }
        const px = x(v), py = y(val); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
      }
    };
    // baseline (faint, dashed)
    ctx.strokeStyle = pal.dim; ctx.lineWidth = 1.2; ctx.setLineDash([3, 3]);
    curve((p) => p); ctx.stroke(); ctx.setLineDash([]);
    // transformed
    const tf = {
      LLI: (p) => ({ mu: p.mu - 0.05, s: p.s, a: p.a * 0.92 }),
      LAM: (p) => ({ mu: p.mu, s: p.s, a: p.a * 0.55 }),
      RES: (p) => ({ mu: p.mu, s: p.s * 1.9, a: p.a * 0.72 }),
    }[mode] || ((p) => p);
    ctx.save(); ctx.shadowColor = accent; ctx.shadowBlur = 6;
    ctx.strokeStyle = accent; ctx.lineWidth = 2; curve(tf); ctx.stroke(); ctx.restore();
  }, [mode, pal, accent]);
  return <div style={{ width: '100%', height: '100%' }}><canvas ref={ref} style={{ display: 'block' }} /></div>;
}

// ───────────────────────── sparkline ─────────────────────────
function Spark({ values, pal, color, marker, w = 80, h = 22 }) {
  const ref = useCanvas((ctx, cw, ch) => {
    const n = values.length; let mn = Infinity, mx = -Infinity;
    for (const v of values) { if (v < mn) mn = v; if (v > mx) mx = v; }
    const x = scale(0, n - 1, 2, cw - 2), y = scale(mn, mx, ch - 3, 3);
    ctx.strokeStyle = color || pal.accent; ctx.lineWidth = 1.3; ctx.lineJoin = 'round';
    ctx.beginPath(); for (let i = 0; i < n; i++) { const px = x(i), py = y(values[i]); i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); } ctx.stroke();
    if (marker != null && marker >= 0 && marker < n) { ctx.fillStyle = color || pal.accent; ctx.beginPath(); ctx.arc(x(marker), y(values[marker]), 2, 0, 7); ctx.fill(); }
  }, [values, pal, color, marker]);
  return <div style={{ width: w, height: h }}><canvas ref={ref} style={{ display: 'block' }} /></div>;
}

Object.assign(window, { useCanvas, SOHLine, MechTimeline, ICASketch, Spark });

</script>
<script type="text/babel">
/* soh-panels.jsx — shared UI primitives for the SOH batch flow.
 * Exports: TweakCtx, Panel, StatTile, MechBadge, MechDot, fmt, useDense.
 */
const TweakCtx = React.createContext({ density: 'comfortable' });
function useDense() { return React.useContext(TweakCtx).density === 'compact'; }

const fmt = {
  soh: (v) => (v * 100).toFixed(1) + '%',
  pct0: (v) => Math.round(v * 100) + '%',
  mv: (v) => (v >= 0 ? '+' : '') + v.toFixed(0) + ' mV',
  cyc: (n) => Math.round(n).toLocaleString(),
  sci: (v) => { const a = Math.abs(v); if (v === 0) return '0'; if (a >= 0.01 && a < 1e4) return v.toFixed(a < 1 ? 3 : 2); return v.toExponential(2); },
};
const MV = { LLI: '--mech-lli', LAM: '--mech-lam', RES: '--mech-res' };

function Panel({ title, sub, right, children, style, bodyStyle, flush }) {

}

function StatTile({ label, value, unit, sub, tone, big }) {

function MechDot({ mech, size = 9 }) {

}

function MechBadge({ dominant, confidence }) {

function badge(color) {

Object.assign(window, { TweakCtx, useDense, Panel, StatTile, MechDot, MechBadge, fmt });

<script type="text/babel">
/* soh-report.jsx — degradation report: where each mechanism occurs.
 * Exports window.MechReport.
 */
const RV = { LLI: '--mech-lli', LAM: '--mech-lam', RES: '--mech-res' };

function aggregateMechanism(cell, m) {
  const phs = cell.phases.filter((p) => p.mech === m);
  if (!phs.length) return null;
  const startCycle = Math.min(...phs.map((p) => p.startCycle));
  const endCycle = Math.max(...phs.map((p) => p.endCycle));
  let peakShare = 0, peakI = phs[0].i0;
  for (const p of phs) { if (p.peakShare > peakShare) { peakShare = p.peakShare; peakI = Math.round((p.i0 + p.i1) / 2); } }
  return { startCycle, endCycle, peakShare, peakI, onset: cell.onsets[m] ?? startCycle,
    sohStart: cell.sohTrue[phs[0].i0], sohEnd: cell.sohTrue[phs[phs.length - 1].i1] };
}

function evidenceFor(cell, m, i) {
  const row = cell.rows[i], g = row.diag[1];
  if (m === 'LLI') return [`graphite peak shifted ${fmt.mv(g.shiftMv)}`, `peak-match confidence ${Math.round(row.phys.conf * 100)}%`];
  if (m === 'LAM') return [`ICA area down ${Math.round(row.phys.lamLoss * 100)}%`, `peak heights reduced across transitions`];
  return [`peaks broadened ${Math.round(row.phys.resGrowth * 100)}%`, `FWHM widened to ${g.widthMv.toFixed(0)} mV`];
}

function MechReportCard({ cell, m, selIdx }) {
  const agg = aggregateMechanism(cell, m);

  return (
    <div style={{ flex: '1 1 0', minWidth: 0, background: 'var(--panel)', border: '1px solid ' + (activeNow ? col : 'var(--border)'), borderRadius: 11, overflow: 'hidden', boxShadow: activeNow ? `0 0 0 1px ${col}, 0 4px 18px -8px ${col}` : 'none', transition: 'box-shadow .2s, border-color .2s' }}>
      <div style={{ height: 3, background: col }} />
      <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 11 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <MechDot mech={m} size={10} />
          <span style={{ font: '600 12.5px/1.2 "IBM Plex Sans", sans-serif', color: 'var(--text)' }}>{MECH.name}</span>
          {activeNow && <span style={{ marginLeft: 'auto', font: '600 9px/1 "IBM Plex Sans", sans-serif', letterSpacing: '.06em', textTransform: 'uppercase', color: col, border: `1px solid ${col}`, borderRadius: 999, padding: '3px 7px' }}>active now</span>}
        </div>

        {/* occurrence window */}
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '11px 18px' }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={lbl}>Onset</span>
            <span style={{ ...val, color: col }}>{fmt.cyc(agg.onset)}<span style={cyc}> cyc</span></span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={lbl}>Dominant window</span>
            <span style={val}>{fmt.cyc(agg.startCycle)}–{fmt.cyc(agg.endCycle)}</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={lbl}>Peak share</span>
            <span style={val}>{fmt.pct0(agg.peakShare)}</span>
          </div>

        {/* SOH band where it acts */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, font: '400 10.5px/1.3 "IBM Plex Mono", monospace', color: 'var(--dim)' }}>
          <span>SOH {fmt.soh(agg.sohStart)} → {fmt.soh(agg.sohEnd)}</span>
        </div>

        {/* evidence */}
        <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 5 }}>
          {ev.map((e, i) => (
            <li key={i} style={{ display: 'flex', gap: 7, font: '400 11px/1.4 "IBM Plex Sans", sans-serif', color: 'var(--dim)' }}>
              <span style={{ color: col, flex: '0 0 auto' }}>›</span><span>{e}</span>
            </li>
          ))}
        </ul>
      </div>
    </div>
  );
}
const lbl = { font: '500 9px/1 "IBM Plex Sans", sans-serif', letterSpacing: '.05em', textTransform: 'uppercase', color: 'var(--faint)', whiteSpace: 'nowrap' };
const val = { font: '600 14px/1 "IBM Plex Mono", monospace', color: 'var(--text)', fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' };

<script type="text/babel">
/* soh-flow.jsx — batch flow shell: upload CSVs → train → SOH trajectory + report.

const ACCENTS = { teal: [40, 196, 178], blue: [78, 150, 240], amber: [232, 137, 63], violet: [150, 110, 235] };

function buildPal(theme, rgb) {

    danger: dark ? '#e5604d' : '#c8402c', track: dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)',

}
function rootVars(theme, rgb) {
  const dark = theme === 'dark';

    '--panel': dark ? '#15171c' : '#ffffff', '--panel-2': dark ? '#1b1e25' : '#f3f5f7',

    '--danger': dark ? '#e5604d' : '#c8402c', '--mech-lli': '#4d9bf0', '--mech-lam': '#3fc98a', '--mech-res': '#e86bb0',

}

// ───────────────────────── stepper ─────────────────────────
function Stepper({ stage, onJump, trained }) {
  const steps = [['upload', 'Upload'], ['training', 'Train'], ['report', 'Report']];
  const idx = { upload: 0, training: 1, report: 2 }[stage];
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
      {steps.map(([key, label], i) => {

        return (
          <React.Fragment key={key}>
            <button disabled={!clickable} onClick={() => clickable && onJump(key)}
              style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '5px 11px', borderRadius: 999, cursor: clickable ? 'pointer' : 'default',

              <span style={{ width: 18, height: 18, borderRadius: '50%', display: 'grid', placeItems: 'center', font: '600 10px/1 "IBM Plex Mono", monospace',

      })}

}

// ───────────────────────── cycle scrubber ─────────────────────────
function Scrubber({ cell, selIdx, onSelect, pal }) {
  return (

const navBtn = { width: 26, height: 26, borderRadius: 7, cursor: 'pointer', border: '1px solid var(--border)', background: 'var(--panel-2)', color: 'var(--dim)', font: '400 16px/1 system-ui', display: 'grid', placeItems: 'center', flex: '0 0 auto' };

  const data = window.SOHData, o = data.overall;
  const ids = scopeIds && scopeIds.length ? scopeIds : data.cellIds;

            <button onClick={() => onSelectCell('BATCH')} style={{ display: 'flex', alignItems: 'center', gap: 9, width: '100%', textAlign: 'left', padding: '8px 9px', borderRadius: 8, cursor: 'pointer', marginBottom: 4,
              border: '1px solid ' + (onBatch ? 'var(--accent)' : 'var(--border)'), background: onBatch ? 'var(--accent-ghost)' : 'var(--panel-2)' }}>
              <span style={{ width: 6, height: 30, borderRadius: 3, background: 'var(--accent)', opacity: onBatch ? 1 : 0.6, flex: '0 0 auto' }} />
              <div style={{ flex: '1 1 auto', minWidth: 0 }}>
                <div style={{ font: '600 12px/1.2 "IBM Plex Sans", sans-serif', color: onBatch ? 'var(--text)' : 'var(--dim)' }}>Batch average</div>
                <div style={{ font: '400 9.5px/1.3 "IBM Plex Mono", monospace', color: 'var(--faint)' }}>mean of {batchCell.nCells} cells</div>
              </div>
              <Spark values={batchCell.sohPred} pal={pal} color={onBatch ? pal.accent : pal.dim} w={48} h={20} marker={onBatch ? selIdx : null} />
            </button>
          )}
          {cells.map((c) => {
            const active = !onBatch && c.id === cell.id, dom = c.cellDominant;
            const dc = `var(${({ LLI: '--mech-lli', LAM: '--mech-lam', RES: '--mech-res' })[dom]})`;
            return (

                border: '1px solid ' + (active ? 'var(--accent)' : 'transparent'), background: active ? 'var(--accent-ghost)' : 'transparent' }}
                onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = 'var(--hover)'; }} onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
                <span style={{ width: 6, height: 30, borderRadius: 3, background: dc, opacity: active ? 1 : 0.5, flex: '0 0 auto' }} />
                <div style={{ flex: '1 1 auto', minWidth: 0 }}>

                  <div style={{ font: '400 9.5px/1.3 "IBM Plex Sans", sans-serif', color: 'var(--faint)' }}>{c.tempC}°C · {data.MECH[dom].short} · {fmt.cyc(c.maxCycle)} cyc</div>
                </div>
                <Spark values={c.sohPred} pal={pal} color={active ? pal.accent : pal.dim} w={48} h={20} marker={active ? selIdx : null} />
              </button>
            );
          })}
        </div>
      </Panel>

      <Panel title="SOH model" sub={model ? model.name : 'ElasticNet · LOCO'} style={{ flex: '0 0 auto' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
            <StatTile label="R²" value={(model ? model.r2 : cell.metrics.r2).toFixed(3)} tone="accent" />
            <StatTile label="RMSE" value={(model ? model.rmse : cell.metrics.rmse).toFixed(4)} />

          </div>

    </div>
  );
}

<script type="text/babel">
/* soh-landing.jsx */
(function () {
  function seedModels(data) {
    const all = data.cellIds;
    // Add a truncated demo cell (Cell_01 cut at 30% of life) so users can
    // click through the predict flow without uploading real data.
    const base = data.byId['Cell_01'];
    if (base && !data.byId['Cell_01_early']) {
      const cut = Math.ceil(base.nCycles * 0.30);
      const early = {
        ...base,
        id: 'Cell_01_early',
        nCycles: cut,
        cycles:  base.cycles.slice(0, cut),
        sohTrue: base.sohTrue.slice(0, cut),
        sohPred: base.sohPred.slice(0, cut),
        rows:    base.rows.slice(0, cut),
        maxCycle: base.cycles[cut - 1],
        sohLast: base.sohTrue[cut - 1],
        rul: null,  // unknown — not enough history yet
      };
      // Recompute phases on the truncated sequence
      early.phases = base.phases.filter(p => p.startFrac < 0.30).map(p => ({
        ...p, endCycle: Math.min(p.endCycle, early.maxCycle),
        endFrac: Math.min(p.endFrac, 1),
        sohEnd: early.sohTrue[Math.min(p.i1, cut - 1)],
        i1: Math.min(p.i1, cut - 1),
      }));
      data.byId['Cell_01_early'] = early;
      data.cellIds.push('Cell_01_early');

            <div style={{ width: 38, height: 38, borderRadius: 10, background: 'var(--accent)', color: '#06120f', display: 'grid', placeItems: 'center', font: '300 22px/1 system-ui', flex: '0 0 auto' }}>+</div>
            <div>
              <div style={{ font: '600 13.5px/1.2 "IBM Plex Sans", sans-serif', color: 'var(--text)' }}>Train a new model</div>
              <div style={{ font: '400 11px/1.3 "IBM Plex Sans", sans-serif', color: 'var(--dim)', marginTop: 3 }}>Upload cycle CSVs for a batch of cells → leave-one-cell-out cross-validation</div>
            </div>
            <span style={{ marginLeft: 'auto', font: '600 18px/1 system-ui', color: 'var(--accent)' }}>→</span>
          </button>

          {/* model groups */}
          {Object.entries(groups).map(([type, ms]) => (
            <div key={type} style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                <span style={{ font: '600 11px/1 "IBM Plex Sans", sans-serif', letterSpacing: '.05em', textTransform: 'uppercase', color: 'var(--dim)' }}>{type}</span>
                <span style={{ font: '400 10px/1 "IBM Plex Mono", monospace', color: 'var(--faint)' }}>{ms[0].form} · {ms.length} model{ms.length > 1 ? 's' : ''}</span>
                <span style={{ flex: '1 1 auto', height: 1, background: 'var(--border)' }} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
                {ms.map((m) => <ModelCard key={m.id} m={m} onUse={onUseModel} />)}
              </div>
            </div>
          ))}
          <div style={{ height: 8 }} />
        </div>
      </div>
    );
  }

  function Dropzone({ title, sub, onClick, onDrop }) {
    const [over, setOver] = React.useState(false);
    const handleDrag = (e) => { e.preventDefault(); setOver(true); };
    const handleLeave = () => setOver(false);
    const handleDrop = (e) => {
      e.preventDefault(); setOver(false);
      if (onDrop) { const fs = Array.from(e.dataTransfer.files); if (fs.length) onDrop(fs); }
    };
    return (
      <div onClick={onClick} onDragOver={handleDrag} onDragEnter={handleDrag} onDragLeave={handleLeave} onDrop={handleDrop}
        style={{ border: '1.5px dashed ' + (over ? 'var(--accent)' : 'var(--border)'), borderRadius: 12, padding: '22px 20px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7, background: over ? 'var(--accent-ghost)' : 'var(--panel)', cursor: onClick ? 'pointer' : 'default', transition: 'border-color .15s, background .15s' }}>

  function UploadTrainStage({ pal, onBack, onTrain }) {

    const [demoSel, setDemoSel] = React.useState(() => new Set(data.cellIds));
    const onFiles = (e) => { const picked = Array.from(e.target.files || []); if (picked.length) setFiles(picked); };
    const toggleDemo = (id) => setDemoSel((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
    const hasReal = files.length > 0;
    const canTrain = hasReal || demoSel.size >= 2;
    const go = () => {
      if (hasReal) onTrain(files.map(f => f.name.replace(/\.csv$/i, '')), files, parseFloat(nomCap) || 5.0);

      <div style={{ height: '100%', overflow: 'auto' }}>
        <div style={{ width: 'min(820px, 100%)', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 15 }}>
          <BackLink onBack={onBack} label="Model library" crumb="Train new model" />
          <input ref={fileRef} type="file" multiple accept=".csv,.mat" style={{ display: 'none' }} onChange={onFiles} />
          <Dropzone title={hasReal ? files.length + ' file' + (files.length > 1 ? 's' : '') + ' selected' : 'Click or drag cycle data here'} sub={hasReal ? files.map(f => f.name).join(', ') : 'Oxford .mat or per-cell CSVs (time, voltage, current)'} onClick={() => fileRef.current && fileRef.current.click()} onDrop={(dropped) => setFiles(dropped)} />
          {hasReal && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: 9, padding: '10px 14px' }}>

                style={{ width: 72, height: 28, borderRadius: 6, border: '1px solid var(--border)', background: 'var(--panel-2)', color: 'var(--text)', font: '500 13px/1 "IBM Plex Mono", monospace', textAlign: 'right', padding: '0 8px', outline: 'none' }} />
            </div>

          {!hasReal && (
            <Panel title="Or use demo batch" sub="select cells for cross-validation" right={<span style={{ font: '500 10.5px/1 "IBM Plex Mono", monospace', color: 'var(--accent)' }}>{demoSel.size} selected</span>} flush>
              <div>

                      <Check on={on} />
                      <span style={{ font: '600 12.5px/1.2 "IBM Plex Mono", monospace', color: 'var(--text)', flex: '0 0 92px' }}>{c.id}</span>
                      <span style={{ font: '400 11px/1.2 "IBM Plex Mono", monospace', color: 'var(--dim)', flex: '1 1 auto' }}>{c.id.toLowerCase()}_cycle.csv</span>
                      <span style={{ font: '400 11px/1.2 "IBM Plex Mono", monospace', color: 'var(--faint)' }}>{fmt.cyc(c.maxCycle)} cyc · {c.tempC}°C</span>
                    </button>
                  );
                })}
              </div>
            </Panel>
          )}
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <PrimaryBtn disabled={!canTrain} onClick={go}>Train model →</PrimaryBtn>
            <span style={{ font: '400 11px/1.4 "IBM Plex Sans", sans-serif', color: 'var(--faint)' }}>
              {hasReal ? 'Upload ' + files.length + ' cell' + (files.length > 1 ? 's' : '') + ' → LOCO cross-validation' : demoSel.size < 2 ? 'Select at least 2 cells' : 'Demo mode · LOCO CV across ' + demoSel.size + ' cells'}
            </span>
          </div>
          <div style={{ height: 8 }} />
        </div>
      </div>
    );
  }

  function UploadPredictStage({ pal, model, onBack, onPredict }) {
    const data = window.SOHData;
    const fileRef = React.useRef(null);
    const [file, setFile] = React.useState(null);
    const [nomCap, setNomCap] = React.useState('5.0');
    const compatible = model && model.cellIds && model.cellIds.length ? model.cellIds : data.cellIds;
    const [demoPick, setDemoPick] = React.useState(compatible[0]);
    const onFile = (e) => { const f = e.target.files && e.target.files[0]; if (f) setFile(f); };
    const hasReal = !!file && !!model && !model.seed;
    const go = () => {
      if (hasReal) onPredict(file.name.replace(/\.csv$/i, ''), file, parseFloat(nomCap) || 5.0);
      else onPredict(demoPick, null, null);
    };
    return (
      <div style={{ height: '100%', overflow: 'auto' }}>
        <div style={{ width: 'min(820px, 100%)', margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 15 }}>
          <BackLink onBack={onBack} label="Model library" crumb={model ? model.name + ' · predict' : 'predict'} />
          {model && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: 11, padding: '13px 16px' }}>
              <div style={{ flex: '1 1 auto' }}>
                <div style={{ font: '600 13px/1.2 "IBM Plex Sans", sans-serif', color: 'var(--text)' }}>{model.name}</div>
                <div style={{ font: '400 10.5px/1.3 "IBM Plex Mono", monospace', color: 'var(--faint)', marginTop: 3 }}>{model.type} · {model.form} · trained on {model.cells} cells</div>
              </div>
              <StatTile label="R²" value={model.r2.toFixed(3)} tone="accent" />
